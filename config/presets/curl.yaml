id: "curl"
label: "cURL"
description: "Starter template for replaying browser/API requests from pasted cURL commands."
filename_hint: "curl_example"
content_template: |
  name: {{display_name_single_quoted}}
  description: "Paste a cURL command, extract headers, then call your endpoint."
  flow:
    - id: collect_curl
      use: curl
      args:
        label: "Session cURL"
        description: "Paste the full cURL command copied from browser DevTools."
      secrets:
        curl_command: "curl_command"
      outputs:
        request_headers: "headers"

    - id: fetch_data
      use: http
      args:
        url: "https://api.example.com/v1/usage?status=active"
        method: "GET"
        headers: "{request_headers}"
      outputs:
        usage_payload: "http_response"

    - id: parse_usage
      use: extract
      args:
        source: "{usage_payload}"
        type: "jsonpath"
      outputs:
        result_count: "$.results.length()"

  templates:
    - id: "curl_usage"
      type: "source_card"
      ui:
        title: "cURL Session"
        icon: "TERMINAL"
      widgets:
        - type: "FactSet"
          facts:
            - label: "Filtered Results"
              value: "{result_count}"
