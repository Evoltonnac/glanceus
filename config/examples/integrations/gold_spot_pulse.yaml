name: "Gold Spot Pulse"
description: "Track tokenized gold (PAXG) spot price and 24-hour movement from CoinGecko."
flow:
    - id: fetch_gold
      use: http
      args:
          url: "https://api.coingecko.com/api/v3/simple/price?ids=pax-gold&vs_currencies=usd&include_24hr_change=true"
          method: "GET"
      outputs:
          spot_payload: "http_response"
    - id: parse_paxg
      use: extract
      args:
          source: "{spot_payload}"
          type: "jsonpath"
      outputs:
          paxg_price: "$['pax-gold'].usd"
          paxg_change_24h: "$['pax-gold'].usd_24h_change"
    - id: enrich_market_snapshot
      use: script
      args:
          code: |
              price = float(paxg_price or 0)
              change_24h = float(paxg_change_24h or 0)

              paxg_usd_per_gram = price / 31.1034768 if price > 0 else 0
              paxg_change_text = f"{change_24h:+.2f}%"

              if change_24h > 0.05:
                  trend_label = "24h Up"
                  trend_tone = "success"
              elif change_24h < -0.05:
                  trend_label = "24h Down"
                  trend_tone = "danger"
              else:
                  trend_label = "24h Flat"
                  trend_tone = "muted"
      outputs:
          paxg_usd_per_gram: "paxg_usd_per_gram"
          paxg_change_text: "paxg_change_text"
          trend_label: "trend_label"
          trend_tone: "trend_tone"
templates:
    - id: "gold_market_snapshot"
      type: "source_card"
      ui:
          title: "Gold Spot Pulse"
          icon: "GLD"
      widgets:
          - type: "Container"
            spacing: "sm"
            items:
                - type: "ColumnSet"
                  spacing: "md"
                  columns:
                      - type: "Column"
                        width: "stretch"
                        spacing: "sm"
                        items:
                            - type: "TextBlock"
                              text: "US${fixed(paxg_price, 2)}"
                              size: "xl"
                              weight: "bold"
                            - type: "TextBlock"
                              text: "PAXG spot (1 troy oz)"
                              size: "sm"
                              tone: "muted"
                            - type: "TextBlock"
                              text: "~ ${fixed(paxg_usd_per_gram, 2)} per gram"
                              size: "sm"
                              tone: "muted"
                      - type: "Column"
                        width: "auto"
                        align_y: "start"
                        spacing: "sm"
                        items:
                            - type: "Badge"
                              text: "USD Spot"
                              size: "sm"
                              tone: "info"
                            - type: "Badge"
                              text: "{trend_label}"
                              size: "sm"
                              tone: "{trend_tone}"
                - type: "FactSet"
                  spacing: "sm"
                  facts:
                      - label: "24h Change"
                        value: "{paxg_change_text}"
                      - label: "Market"
                        value: "Tokenized Gold (PAXG)"
                      - label: "Source"
                        value: "CoinGecko"
                - type: "ActionSet"
                  align_x: "start"
                  spacing: "sm"
                  actions:
                      - type: "Action.OpenUrl"
                        title: "Open CoinGecko"
                        url: "https://www.coingecko.com/en/coins/pax-gold"
                        size: "sm"
                        tone: "muted"
