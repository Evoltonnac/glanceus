id: "api_key"
label: "API Key"
description: "Starter template for bearer-token APIs with simple Bento Card output."
filename_hint: "api_key_example"
content_template: |
  name: {{display_name_single_quoted}}
  description: "Fetch a protected endpoint with an API key."
  flow:
    - id: collect_api_key
      use: api_key
      args:
        label: "API Key"
        description: "Enter your API key or personal access token."
      secrets:
        api_key: "api_key"
      outputs:
        api_key: "api_key"

    - id: fetch_metrics
      use: http
      args:
        url: "https://api.example.com/v1/metrics/summary"
        method: "GET"
        headers:
          Authorization: "Bearer {api_key}"
          Accept: "application/json"
      outputs:
        metrics_payload: "http_response"

    - id: parse_summary
      use: extract
      args:
        source: "{metrics_payload}"
        type: "jsonpath"
      outputs:
        metric_value: "$.value"
        metric_status: "$.status"
        metric_updated_at: "$.updated_at"

  templates:
    - id: "api_key_snapshot"
      type: "source_card"
      ui:
        title: "API Key Snapshot"
        icon: "KEY"
      widgets:
        - type: "Container"
          spacing: "sm"
          items:
            - type: "TextBlock"
              text: "{metric_value}"
              size: "xl"
              weight: "bold"
            - type: "FactSet"
              facts:
                - label: "Status"
                  value: "{metric_status}"
                - label: "Updated"
                  value: "{metric_updated_at}"
