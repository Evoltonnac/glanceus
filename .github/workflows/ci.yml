name: CI

on:
    push:
        branches:
            - main
    pull_request:
    workflow_dispatch:

jobs:
    backend-core:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.11"

            - name: Install backend dependencies
              run: pip install -r requirements.txt

            - name: Run backend core suite
              run: bash scripts/test_backend_core.sh

    frontend-core:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: npm
                  cache-dependency-path: ui-react/package-lock.json

            - name: Install frontend dependencies
              working-directory: ui-react
              run: npm ci

            - name: Run frontend core suite
              run: bash scripts/test_frontend_core.sh

            - name: Run frontend typecheck
              working-directory: ui-react
              run: npm run typecheck

    create-release:
        if: github.event_name == 'workflow_dispatch'
        needs:
            - backend-core
            - frontend-core
        runs-on: ubuntu-latest
        permissions:
            contents: write
        outputs:
            version: ${{ steps.get_version.outputs.VERSION }}
            tag: ${{ steps.release_meta.outputs.TAG }}
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: "20"

            - name: Get version
              id: get_version
              run: |
                  VERSION=$(node -p "require('./ui-react/package.json').version")
                  echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"

            - name: Ensure GitHub Release
              id: release_meta
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  TAG="v${{ steps.get_version.outputs.VERSION }}"
                  echo "TAG=$TAG" >> "$GITHUB_OUTPUT"

                  if gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
                    echo "Release $TAG already exists."
                  else
                    gh release create "$TAG" \
                      --title "Glanceus v${{ steps.get_version.outputs.VERSION }}" \
                      --notes "Automated release for Glanceus v${{ steps.get_version.outputs.VERSION }}." \
                      --draft \
                      --repo "${{ github.repository }}"
                  fi

    release-tauri:
        if: github.event_name == 'workflow_dispatch'
        needs:
            - create-release
        permissions:
            contents: write
        env:
            TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
            TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        strategy:
            fail-fast: false
            matrix:
                include:
                    - platform: macos-15
                      rust_target: aarch64-apple-darwin
                      tauri_args: --bundles app,dmg --target aarch64-apple-darwin
                      app_name: Glanceus
                    - platform: macos-15-intel
                      rust_target: x86_64-apple-darwin
                      tauri_args: --bundles app,dmg --target x86_64-apple-darwin
                      app_name: Glanceus
                    - platform: windows-latest
                      rust_target: x86_64-pc-windows-msvc
                      tauri_args: --bundles nsis --target x86_64-pc-windows-msvc
        runs-on: ${{ matrix.platform }}
        defaults:
            run:
                shell: bash
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: npm
                  cache-dependency-path: ui-react/package-lock.json

            - name: Setup Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.11"

            - name: Setup Rust
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: ${{ matrix.rust_target }}

            - name: Install backend dependencies
              run: pip install -r requirements.txt

            - name: Install frontend dependencies
              working-directory: ui-react
              run: npm ci

            - name: Validate updater signing secrets
              run: |
                  if [[ -z "${TAURI_SIGNING_PRIVATE_KEY:-}" ]]; then
                    echo "Missing TAURI_SIGNING_PRIVATE_KEY secret."
                    exit 1
                  fi
                  if [[ -z "${TAURI_SIGNING_PRIVATE_KEY_PASSWORD:-}" ]]; then
                    echo "Missing TAURI_SIGNING_PRIVATE_KEY_PASSWORD secret."
                    exit 1
                  fi

            - name: Run release prebuild script
              env:
                  SKIP_TAURI_BUILD: "1"
              run: bash scripts/build.sh --prepare-only

            - name: Build Tauri app
              working-directory: ui-react
              run: |
                  npm run tauri build -- ${{ matrix.tauri_args }}


            - name: Upload Release Asset
              if: matrix.platform == 'macos-15' || matrix.platform == 'macos-15-intel'
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  DMG_DIR="ui-react/src-tauri/target/${{ matrix.rust_target }}/release/bundle/dmg"
                  if [[ ! -d "$DMG_DIR" ]]; then
                    echo "Missing DMG output directory: $DMG_DIR"
                    exit 1
                  fi
                  DMG_PATH=$(find "$DMG_DIR" -name "*.dmg" -type f -print -quit)
                  if [[ -z "$DMG_PATH" ]]; then
                    echo "Missing DMG artifact."
                    exit 1
                  fi
                  echo "DMG path: $DMG_PATH"

                  gh release upload "${{ needs.create-release.outputs.tag }}" "$DMG_PATH" --clobber --repo "${{ github.repository }}"

            - name: Upload Windows Release Asset
              if: matrix.platform == 'windows-latest'
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  NSIS_DIR="ui-react/src-tauri/target/${{ matrix.rust_target }}/release/bundle/nsis"
                  if [[ ! -d "$NSIS_DIR" ]]; then
                    echo "Missing Windows NSIS output directory: $NSIS_DIR"
                    exit 1
                  fi
                  NSIS_PATH=$(find "$NSIS_DIR" -name "*.exe" -type f -print -quit)
                  if [[ -z "$NSIS_PATH" ]]; then
                    echo "Missing Windows NSIS artifact."
                    exit 1
                  fi
                  echo "NSIS path: $NSIS_PATH"

                  gh release upload "${{ needs.create-release.outputs.tag }}" "$NSIS_PATH" --clobber --repo "${{ github.repository }}"

            - name: Upload Updater Manifest
              if: matrix.platform == 'macos-15'
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  BUNDLE_DIR="ui-react/src-tauri/target/${{ matrix.rust_target }}/release/bundle"
                  if [[ ! -d "$BUNDLE_DIR" ]]; then
                    echo "Missing release bundle directory: $BUNDLE_DIR"
                    exit 1
                  fi

                  UPDATER_ARCHIVE_PATH=$(find "$BUNDLE_DIR" -name "*.app.tar.gz" -type f -print -quit)
                  if [[ -z "$UPDATER_ARCHIVE_PATH" ]]; then
                    echo "Missing updater archive (*.app.tar.gz) under $BUNDLE_DIR"
                    exit 1
                  fi
                  echo "updater archive path: $UPDATER_ARCHIVE_PATH"

                  UPDATER_SIG_PATH="${UPDATER_ARCHIVE_PATH}.sig"
                  if [[ ! -f "$UPDATER_SIG_PATH" ]]; then
                    echo "Missing updater signature: $UPDATER_SIG_PATH"
                    exit 1
                  fi
                  echo "updater signature path: $UPDATER_SIG_PATH"

                  gh release upload "${{ needs.create-release.outputs.tag }}" "$UPDATER_ARCHIVE_PATH" "$UPDATER_SIG_PATH" --clobber --repo "${{ github.repository }}"

                  LATEST_JSON_PATH=$(find "$BUNDLE_DIR" -name "latest.json" -type f -print -quit)
                  if [[ -z "$LATEST_JSON_PATH" ]]; then
                    GENERATED_LATEST_JSON_PATH="$RUNNER_TEMP/latest.json"
                    UPDATER_ARCHIVE_BASENAME=$(basename "$UPDATER_ARCHIVE_PATH")
                    UPDATER_TARGET="${{ matrix.rust_target }}"
                    RELEASE_VERSION="${{ needs.create-release.outputs.version }}"
                    RELEASE_TAG="${{ needs.create-release.outputs.tag }}"
                    RELEASE_REPOSITORY="${{ github.repository }}"
                    export GENERATED_LATEST_JSON_PATH
                    export UPDATER_ARCHIVE_BASENAME
                    export UPDATER_TARGET
                    export RELEASE_VERSION
                    export RELEASE_TAG
                    export RELEASE_REPOSITORY
                    export UPDATER_SIG_PATH

                  python - <<'PY'
                  import json
                  import os
                  from datetime import datetime, timezone

                  target_to_platform = {
                      "aarch64-apple-darwin": "darwin-aarch64",
                      "x86_64-apple-darwin": "darwin-x86_64",
                      "x86_64-pc-windows-msvc": "windows-x86_64",
                      "aarch64-pc-windows-msvc": "windows-aarch64",
                      "x86_64-unknown-linux-gnu": "linux-x86_64",
                      "aarch64-unknown-linux-gnu": "linux-aarch64",
                  }

                  target = os.environ["UPDATER_TARGET"]
                  platform = target_to_platform.get(target)
                  if not platform:
                      raise SystemExit(f"Unsupported updater target for manifest generation: {target}")

                  version = os.environ["RELEASE_VERSION"]
                  tag = os.environ["RELEASE_TAG"]
                  repo = os.environ["RELEASE_REPOSITORY"]
                  archive_name = os.environ["UPDATER_ARCHIVE_BASENAME"]
                  sig_path = os.environ["UPDATER_SIG_PATH"]
                  with open(sig_path, "r", encoding="utf-8") as f:
                      signature = f.read().strip()

                  latest_json = {
                      "version": version,
                      "notes": f"Automated release for Glanceus v{version}.",
                      "pub_date": datetime.now(timezone.utc).replace(microsecond=0).isoformat().replace("+00:00", "Z"),
                      "platforms": {
                          platform: {
                              "signature": signature,
                              "url": f"https://github.com/{repo}/releases/download/{tag}/{archive_name}",
                          }
                      },
                  }

                  with open(os.environ["GENERATED_LATEST_JSON_PATH"], "w", encoding="utf-8") as f:
                      json.dump(latest_json, f, indent=2, ensure_ascii=False)
                      f.write("\n")
                  PY
                    LATEST_JSON_PATH="$GENERATED_LATEST_JSON_PATH"
                    echo "Generated updater manifest: $LATEST_JSON_PATH"
                  fi
                  echo "latest.json path: $LATEST_JSON_PATH"

                  gh release upload "${{ needs.create-release.outputs.tag }}" "$LATEST_JSON_PATH#latest.json" --clobber --repo "${{ github.repository }}"
